<div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <button
    type="button"
    (click)="onToggle()"
    class="flex w-full items-center justify-between px-5 py-4"
  >
    <span class="text-sm font-bold uppercase text-slate-700"> SESSION INFO </span>

    <i
      class="fa-solid transition-transform duration-200"
      [class.fa-chevron-up]="isOpen()"
      [class.fa-chevron-down]="!isOpen()"
    ></i>
  </button>

  @if (isOpen()) {
    <div class="border-t border-slate-100 px-5 py-5">
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
        <div>
          <p class="text-xs text-slate-500">Patient</p>

          <p class="font-semibold text-slate-900">
            {{ session()?.patientName ?? 'Loading...' }}
          </p>
        </div>

        <div>
          <p class="text-xs text-slate-500">Scheduled</p>

          <p class="font-semibold text-slate-900">
            {{ session()?.slotStart | date: 'shortTime' }}
          </p>
        </div>

        <div>
          <p class="text-xs text-slate-500">Duration</p>

          <p class="font-semibold text-slate-900">{{ session()?.durationInMinutes ?? 0 }} min</p>
        </div>
      </div>
    </div>
  }
</div>
