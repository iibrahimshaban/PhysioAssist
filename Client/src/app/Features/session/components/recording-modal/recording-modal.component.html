<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-[2px]"
>
  <div class="w-[330px] rounded-2xl bg-white px-8 py-8 text-center shadow-xl">
    <div class="mx-auto mb-4 flex h-24 w-24 items-center justify-center rounded-full bg-red-100">
      <i class="fa-solid fa-microphone text-4xl text-red-500"></i>
    </div>

    <p class="mb-4 text-3xl font-bold text-slate-900">
      {{ formatRecordingTime(seconds()) }}
    </p>

    @if (isUploading()) {
      <p class="mb-4 text-sm font-semibold text-slate-500">Uploading and transcribing...</p>
    }

    <div class="flex justify-center gap-3">
      <button
        type="button"
        (click)="stop.emit()"
        [disabled]="isUploading()"
        class="flex h-10 items-center gap-2 rounded-lg bg-red-500 px-6 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:opacity-60"
      >
        <i class="fa-regular fa-square text-xs"></i>
        Stop
      </button>

      <button
        type="button"
        (click)="cancel.emit()"
        [disabled]="isUploading()"
        class="h-10 rounded-lg border border-slate-200 bg-slate-50 px-6 text-sm font-semibold text-slate-700 disabled:cursor-not-allowed disabled:opacity-60"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
