<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
  <button
    type="button"
    (click)="onSave()"
    [disabled]="isSaving() || isCompleting()"
    class="rounded-xl border border-slate-200 bg-white py-4 font-semibold shadow-sm transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
  >
    @if (isSaving()) {
      <i class="fa-solid fa-spinner mr-2 animate-spin"></i>
      Saving...
    } @else {
      Save draft
    }
  </button>

  <button
    type="button"
    (click)="onComplete()"
    [disabled]="isCompleting() || isSaving()"
    class="rounded-xl bg-[#0B8EEA] py-4 font-semibold text-white shadow-sm transition hover:bg-[#278f43] disabled:cursor-not-allowed disabled:opacity-60"
  >
    @if (isCompleting()) {
      <i class="fa-solid fa-spinner mr-2 animate-spin"></i>
      Completing...
    } @else {
      Complete session
    }
  </button>
</div>
