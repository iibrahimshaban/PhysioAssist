<div class="min-h-screen bg-[#f5fafc]">
  <app-session-header [session]="sessionDetails()"></app-session-header>

  <main
    class="mx-auto mt-5 grid max-w-[1100px] grid-cols-1 gap-5 px-4 pb-8 sm:px-6 lg:grid-cols-12"
  >
    <!-- Main session content -->
    <section class="lg:col-span-8">
      <!-- Session notes -->
      <app-session-notes
        [notes]="notes()"
        [audioFileUrl]="sessionDetails()?.audioFileUrl ?? null"
        [isUploadingAudio]="isUploadingAudio()"
        (notesChange)="onNotesChanged($event)"
        (record)="openRecordingModal()"
      ></app-session-notes>

      <!-- Session information -->
      <app-session-info
        class="mt-4"
        [session]="sessionDetails()"
        [isOpen]="sessionInfoOpen()"
        (toggle)="toggleSessionInfo()"
      ></app-session-info>

      <!-- Attachments -->
      <app-session-attachments
        class="mt-4"
        [session]="sessionDetails()"
        [(selectedFiles)]="selectedAttachmentFiles"
        (deleteUploaded)="deleteAttachment($event)"
      ></app-session-attachments>

      <!-- Actions -->
      <app-session-actions
        class="mt-4"
        [isSaving]="isSavingDraft()"
        [isCompleting]="isCompletingSession()"
        (save)="saveDraft()"
        (complete)="completeSession()"
      ></app-session-actions>
    </section>

    <!-- Dictation guide sidebar -->
    <app-dictation-guide
      class="lg:col-span-4"
      [isOpen]="dictationGuideOpen()"
      (toggle)="toggleDictationGuide()"
    ></app-dictation-guide>
  </main>

  <!-- Recording modal -->
  @if (isRecordingModalOpen()) {
    <app-recording-modal
      [seconds]="recordingSeconds()"
      [isUploading]="isUploadingAudio()"
      (stop)="stopRecording()"
      (cancel)="cancelRecording()"
    />
  }
</div>
