<div class="min-h-screen bg-gray-50 p-8">

  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">My Account</h1>
      <p class="text-gray-500 text-sm mt-1">Manage your profile and clinic information.</p>
    </div>

    <!-- Profile card -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 mb-6">

      <!-- Avatar + name -->
      <div class="flex items-center gap-5 mb-8">
        <div class="w-20 h-20 rounded-full flex items-center justify-center text-white text-2xl font-bold shrink-0"
             style="background: linear-gradient(145deg, #1a7fd4 0%, #0eb8a0 100%)">
          SA
        </div>
        <div>
          <h2 class="text-xl font-semibold text-gray-900">Dr. Sarah Ahmed</h2>
          <span class="inline-block mt-1 text-xs font-medium text-blue-600 bg-blue-50 border border-blue-100 rounded-full px-3 py-0.5">
            Solo Doctor
          </span>
        </div>
      </div>

      <!-- Info grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">First Name</span>
          <span class="text-sm font-medium text-gray-800">Sarah</span>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Last Name</span>
          <span class="text-sm font-medium text-gray-800">Ahmed</span>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Email</span>
          <span class="text-sm font-medium text-gray-800">dr.sarah&#64;clinic.eg</span>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Username</span>
          <span class="text-sm font-medium text-gray-800">dr.sarah</span>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Clinic Name</span>
          <span class="text-sm font-medium text-gray-800">Cairo Physio Center</span>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Member Since</span>
          <span class="text-sm font-medium text-gray-800">June 2025</span>
        </div>

      </div>

    </div>

    <!-- Danger zone -->
    <div class="bg-white rounded-2xl border border-red-100 shadow-sm p-6">
      <h3 class="text-sm font-semibold text-red-600 mb-1">Danger Zone</h3>
      <p class="text-xs text-gray-400 mb-4">These actions are irreversible. Proceed with caution.</p>
      <button class="text-sm font-medium text-red-500 border border-red-200 rounded-lg px-4 py-2 hover:bg-red-50 transition-colors">
        Delete account
      </button>
    </div>

  </div>

</div>
