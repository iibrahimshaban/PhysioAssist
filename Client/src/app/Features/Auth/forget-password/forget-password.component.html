<div class="flex h-screen">

  <!-- ─── Left panel ──────────────────────────────────────────────────────── -->
  <div class="hidden lg:flex w-[52%] flex-col justify-between p-10"
       style="background: linear-gradient(145deg, #1a7fd4 0%, #0eb8a0 100%)">

    <div class="flex items-center gap-2 text-white">
      <i class="pi pi-heart-fill text-xl"></i>
      <span class="font-semibold text-lg tracking-tight">PhysioAssist</span>
    </div>

    <div class="text-white">
      <h1 class="text-4xl font-bold leading-tight mb-4">We'll get you back in.</h1>
      <p class="text-white/75 text-base max-w-sm leading-relaxed">
        Reset your password securely and continue managing your clinic.
      </p>
    </div>

    <p class="text-white/50 text-sm">© PhysioAssist · v1</p>
  </div>

  <!-- ─── Right panel ─────────────────────────────────────────────────────── -->
  <div class="flex-1 flex items-center justify-center bg-gray-50 px-6">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-10">

      <!-- Heading -->
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-1">Forgot your password?</h2>
        <p class="text-gray-500 text-sm">Enter your email and we'll send you a reset code.</p>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" novalidate>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-700">Email</label>
          <input
            pInputText
            type="email"
            formControlName="email"
            placeholder="you@clinic.eg"
            class="w-full"
            [class.ng-invalid]="isInvalid()"
            [class.ng-dirty]="isInvalid()"
          />
          @if (isInvalid()) {
            <span class="text-xs text-red-500">{{ getEmailError() }}</span>
          }
        </div>

        <p-button
          type="submit"
          label="Send reset code"
          styleClass="w-full"
          [loading]="loading()"
          [disabled]="loading()"
        />

      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Remember it?
        <a routerLink="/auth/login"
           class="font-medium text-blue-600 hover:text-blue-700 transition-colors">
          Sign in
        </a>
      </p>

    </div>
  </div>

</div>
