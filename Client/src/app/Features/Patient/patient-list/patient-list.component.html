<div class="page-container mx-auto p-6">

  <!-- Header -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Patients</h1>
      <p class="text-gray-400 mt-1 text-sm">Nearest session first</p>
    </div>
    <button (click)="goToCreate()"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-white font-semibold text-sm transition-opacity hover:opacity-90"
      style="background: linear-gradient(135deg, #1a7fd4, #0eb8a0)">
      <i class="pi pi-plus"></i>
      Add Patient
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="text-center text-gray-400 py-20">
    <i class="pi pi-spin pi-spinner text-2xl"></i>
    <p class="mt-2 text-sm">Loading patients...</p>
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading && patients.length === 0"
    class="bg-white rounded-2xl shadow p-12 text-center text-gray-400">
    <i class="pi pi-users text-4xl mb-3"></i>
    <p class="text-sm">No patients found. Add your first patient.</p>
  </div>

  <!-- Patient Cards -->
  <div *ngIf="!isLoading && patients.length > 0" class="flex flex-col gap-3">
    <div *ngFor="let patient of patients"
      (click)="goToDetail(patient.id)"
      class="bg-white rounded-2xl border border-gray-100 px-5 py-4 flex items-center justify-between hover:shadow-md transition-shadow cursor-pointer">

      <!-- Left: Avatar + Name + Phone -->
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-full flex items-center justify-center text-white text-sm font-bold shrink-0"
          style="background: linear-gradient(145deg, #1a7fd4 0%, #0eb8a0 100%)">
          {{ getInitials(patient.fullName) }}
        </div>
        <div>
          <p class="font-semibold text-gray-900 text-sm">{{ patient.fullName }}</p>
          <p class="text-xs text-gray-400 mt-0.5">{{ patient.phoneNumber }}</p>
        </div>
      </div>

      <!-- Right: Slot time + badge + chevron -->
      <div class="flex items-center gap-4">

        <div class="text-right" *ngIf="patient.slotStart">
          <p class="text-sm font-semibold text-gray-800">
            {{ patient.slotStart | date:'h:mm a' }}
          </p>
          <span class="inline-block mt-0.5 text-xs font-medium text-blue-600 bg-blue-50 border border-blue-100 rounded-full px-2.5 py-0.5">
            scheduled
          </span>
        </div>

        <div class="text-right" *ngIf="!patient.slotStart">
          <p class="text-xs text-gray-400">No session today</p>
        </div>

        <i class="pi pi-chevron-right text-gray-300 text-xs"></i>
      </div>

    </div>
  </div>

</div>
