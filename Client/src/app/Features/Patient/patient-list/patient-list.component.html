<div class="min-h-screen bg-[#f5fafc] p-6">
  <div class="mx-auto max-w-5xl">

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-slate-900">Patients</h1>
        <p class="mt-1 text-sm text-slate-500">Nearest session first</p>
      </div>
      <button (click)="goToCreate()"
        class="inline-flex items-center gap-2 rounded-lg bg-[#0B8EEA] px-5 py-2.5 text-sm font-semibold text-white hover:bg-[#0a7ed1] transition-colors">
        <i class="pi pi-plus"></i>
        Add Patient
      </button>
    </div>

    <div class="mb-4 flex items-center gap-4">
      <div class="relative flex-1">
        <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Search by name or phone"
          class="w-full rounded-xl border border-slate-200 bg-white py-3 pl-11 pr-4 text-sm outline-none focus:border-[#0B8EEA]" />
      </div>

      <div class="flex shrink-0 rounded-xl border border-slate-200 bg-white p-1">
        <button (click)="setTab('all')"
          [class]="activeTab === 'all'
            ? 'rounded-lg bg-[#0B8EEA] px-4 py-2 text-sm font-semibold text-white'
            : 'rounded-lg px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700'">
          All
        </button>
        <button (click)="setTab('today')"
          [class]="activeTab === 'today'
            ? 'rounded-lg bg-[#0B8EEA] px-4 py-2 text-sm font-semibold text-white'
            : 'rounded-lg px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700'">
          Today
        </button>
        <button (click)="setTab('pending')"
          [class]="activeTab === 'pending'
            ? 'rounded-lg bg-[#0B8EEA] px-4 py-2 text-sm font-semibold text-white'
            : 'rounded-lg px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700'">
          Pending
        </button>
      </div>
    </div>

    <div *ngIf="isLoading" class="py-20 text-center text-slate-400">
      <i class="pi pi-spin pi-spinner text-2xl"></i>
      <p class="mt-2 text-sm">Loading patients...</p>
    </div>

    <div *ngIf="!isLoading && filteredPatients.length === 0"
      class="rounded-xl bg-white p-12 text-center text-slate-400 shadow-sm">
      <i class="pi pi-users text-4xl mb-3"></i>
      <p class="text-sm">No patients found.</p>
    </div>

    <div *ngIf="!isLoading && filteredPatients.length > 0" class="flex flex-col gap-3">
      <div *ngFor="let patient of filteredPatients"
        (click)="goToDetail(patient.id)"
        class="flex cursor-pointer items-center justify-between rounded-xl border border-slate-200 bg-white px-6 py-4 shadow-sm transition-shadow hover:shadow-md">

        <div class="flex items-center gap-4">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-sky-50 text-sm font-bold text-[#0B8EEA]">
            {{ getInitials(patient.fullName) }}
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-900">{{ patient.fullName }}</p>
            <p class="mt-0.5 text-xs text-slate-400">{{ patient.phoneNumber }}</p>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="text-right" *ngIf="patient.slotStart">
            <p class="text-sm font-semibold text-slate-800">
              {{ patient.slotStart | date:'h:mm a' }}
            </p>
            <span class="mt-0.5 inline-block rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-500">
              scheduled
            </span>
          </div>
          <div class="text-right" *ngIf="!patient.slotStart">
            <p class="text-xs text-slate-400">No session today</p>
          </div>
          <i class="pi pi-chevron-right text-xs text-slate-300"></i>
        </div>

      </div>
    </div>

  </div>
</div>
