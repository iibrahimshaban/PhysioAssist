<div class="min-h-screen bg-[#f5fafc] p-6">
  <div class="page-container mx-auto max-w-2xl">

    <!-- Header -->
    <div class="mb-6 flex items-center gap-4">
      <button (click)="goBack()"
        class="inline-flex items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors text-sm">
        <i class="pi pi-arrow-left"></i> Back
      </button>
      <div>
        <h1 class="text-3xl font-bold text-slate-900">{{ isEditMode ? 'Edit Patient' : 'Add Patient' }}</h1>
        <p class="text-slate-500 mt-1 text-sm">{{ isEditMode ? 'Update patient information.' : 'Register a new patient.' }}</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm space-y-5">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700">Full Name <span class="text-red-500">*</span></label>
          <input formControlName="fullName" type="text" placeholder="Enter full name"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#0B8EEA] focus:ring-2 focus:ring-sky-100" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700">Date of Birth <span class="text-red-500">*</span></label>
          <input formControlName="dateOfBirth" type="date"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#0B8EEA] focus:ring-2 focus:ring-sky-100" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700">Phone Number <span class="text-red-500">*</span></label>
          <input formControlName="phoneNumber" type="tel" placeholder="Enter phone number"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#0B8EEA] focus:ring-2 focus:ring-sky-100" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700">Gender <span class="text-red-500">*</span></label>
          <select formControlName="gender"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#0B8EEA] focus:ring-2 focus:ring-sky-100">
            <option value="0">Male</option>
            <option value="1">Female</option>
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-slate-700">Email Address</label>
          <input formControlName="emailAddress" type="email" placeholder="Enter email address"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#0B8EEA] focus:ring-2 focus:ring-sky-100" />
        </div>

      </div>

      <div class="flex gap-4 mt-6">
        <button type="submit" [disabled]="isLoading"
          class="inline-flex items-center gap-2 px-8 py-3 rounded-xl text-white font-semibold text-sm bg-[#0B8EEA] hover:bg-[#0a7ed1] transition-colors">
          <i class="pi pi-check"></i>
          {{ isEditMode ? 'Update Patient' : 'Create Patient' }}
        </button>
        <button type="button" (click)="goBack()"
          class="inline-flex items-center gap-2 px-8 py-3 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
          Cancel
        </button>
      </div>

    </form>

  </div>
</div>
