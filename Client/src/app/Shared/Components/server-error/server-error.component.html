<div class="error-page animate-fade-in">
  <div class="error-card">
    <div class="error-icon-wrapper">
      <i class="pi pi-exclamation-triangle"></i>
    </div>
    <h1 class="error-title">Internal Server Error</h1>
    <p class="error-description">Something went wrong on our end. Please try again or contact support if the problem persists.</p>

    @if(error(); as e) {
      <div class="error-details">
        <div class="error-detail-row">
          <span class="error-detail-label">Error</span>
          <span class="error-detail-value">{{ e.message }}</span>
        </div>
        <div class="error-detail-row">
          <span class="error-detail-label">Origin</span>
          <span class="error-detail-value">This error comes from the server, not Angular</span>
        </div>

        <details class="error-stack-details">
          <summary class="error-stack-summary">Stack Trace</summary>
          <code class="error-stack">{{ e.details }}</code>
        </details>
      </div>
    }

    <button class="error-button" (click)="reload()">
      <i class="pi pi-refresh"></i>
      Try Again
    </button>
  </div>
</div>
